# SAP + SharePoint Enterprise Template overrides
# This file is auto-merged with docker-compose.yml by Docker Compose.
#
# What this adds:
# - Local build of the api image (required for auth cookie + OBO token fixes)
# - Config file mount (config/librechat.enterprise.yaml -> /app/librechat.yaml)
# - MCP server dependencies and service definitions (sap-docs-mcp, vsp-mcp)
# - Ollama LLM: runs natively on the host Mac; accessed via host.docker.internal:11434

services:
  api:
    # Build locally so the auth cookie and OBO token fixes in api/ are applied.
    # See docs/code-changes.md for details on what was patched and why.
    build:
      context: .
      dockerfile: Dockerfile
    image: librechat-mcp-sharepoint:local
    depends_on:
      - mongodb
      - rag_api
      - sap-docs-mcp
      - vsp-mcp
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ./config/librechat.enterprise.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  # --- MCP Servers ---

  sap-docs-mcp:
    container_name: sap-docs-mcp
    build:
      context: ./docker/sap-docs-mcp
      args:
        # Set to false to enable online sources (SAP Help, Community, Software Heroes) by default
        - SAP_DOCS_OFFLINE_MODE=${SAP_DOCS_OFFLINE_MODE:-true}
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3122
      # Offline-only mode: online sources (SAP Help, Community, Software Heroes) are excluded
      # from search by default. Users can still pass includeOnline=true per request to opt in.
      - MCP_INCLUDE_ONLINE_DEFAULT=false
    restart: unless-stopped
    ports:
      - "3124:3122"

  vsp-mcp:
    container_name: vsp-mcp
    build:
      context: ./docker/vsp-mcp
    cap_add:
      - NET_ADMIN
    environment:
      - SAP_URL=${SAP_URL}
      - SAP_USER=${SAP_TECH_USER}
      - SAP_PASSWORD=${SAP_TECH_PASSWORD}
      - SAP_CLIENT=${SAP_CLIENT}
      - SAP_INSECURE=${SAP_INSECURE}
      - MCP_PROXY_PORT=3000
      - VSP_MODE=focused
      - SAP_READ_ONLY=true
      - VSP_EXTRA_ARGS=--block-free-sql --transport-read-only --disabled-groups debugger
    restart: unless-stopped
    ports:
      - "3130:3000"

